apiVersion: apps/v1
kind: Deployment
metadata:
  name: owl-scheduler
  namespace: owl-scheduler-system
  labels:
    app.kubernetes.io/name: owl-scheduler
    app.kubernetes.io/part-of: owl-scheduler
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: owl-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: owl-scheduler
        app.kubernetes.io/part-of: owl-scheduler
        app.kubernetes.io/version: "0.1.0"
    spec:
      serviceAccountName: owl-scheduler
      terminationGracePeriodSeconds: 30
      priorityClassName: system-cluster-critical
      # Ensure scheduler pods don't land on the same node
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: owl-scheduler
                topologyKey: kubernetes.io/hostname
      # Don't schedule on the node running the default scheduler
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scheduler
          image: owl-scheduler:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - /scheduler
          args:
            - --config=/etc/kubernetes/scheduler-config/scheduler-config.yaml
            - --leader-elect=true
            - --leader-elect-lease-duration=15s
            - --leader-elect-renew-deadline=10s
            - --leader-elect-retry-period=2s
            - --leader-elect-resource-namespace=owl-scheduler-system
            - --leader-elect-resource-name=owl-scheduler
            - --v=4
          ports:
            - name: health
              containerPort: 10259
              protocol: TCP
            - name: metrics
              containerPort: 9443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /healthz
              port: health
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: scheduler-config
              mountPath: /etc/kubernetes/scheduler-config
              readOnly: true
      volumes:
        - name: scheduler-config
          configMap:
            name: owl-scheduler-config
            items:
              - key: scheduler-config.yaml
                path: scheduler-config.yaml
