apiVersion: v1
kind: Service
metadata:
  name: owl-scheduler
  namespace: owl-scheduler-system
  labels:
    app.kubernetes.io/name: owl-scheduler
    app.kubernetes.io/part-of: owl-scheduler
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: owl-scheduler
  ports:
    - name: health
      port: 10259
      targetPort: health
      protocol: TCP
    - name: metrics
      port: 9443
      targetPort: metrics
      protocol: TCP
  # Not a headless service — we want a stable ClusterIP for monitoring
  clusterIP: None
